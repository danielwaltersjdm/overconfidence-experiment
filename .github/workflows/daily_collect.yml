name: Daily Collect

# Collect predictions at 16:30 UTC Mon–Fri (after US market close).
# Also runs on weekends — the Python script skips financial domains based on
# config.yaml weekend_collection settings.
on:
  schedule:
    - cron: "30 16 * * 1-5"  # Mon–Fri, 16:30 UTC
  workflow_dispatch:          # allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: study4/requirements.txt

      - name: Install dependencies
        run: pip install -r study4/requirements.txt

      - name: Run collection
        working-directory: study4
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
        run: python collect_predictions.py

      - name: Commit new predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add study4/data/predictions/
          git diff --staged --quiet || git commit -m "chore: collect predictions $(date -u +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push
