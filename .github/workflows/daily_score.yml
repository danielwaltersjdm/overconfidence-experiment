name: Daily Score

# Fetch resolved actuals and score predictions at 18:00 UTC Mon–Fri.
on:
  schedule:
    - cron: "0 18 * * 1-5"   # Mon–Fri, 18:00 UTC
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: study4/requirements.txt

      - name: Install dependencies
        run: pip install -r study4/requirements.txt

      - name: Fetch actuals
        working-directory: study4
        run: python fetch_actuals.py

      - name: Score predictions
        working-directory: study4
        run: python score.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add study4/data/actuals/ study4/data/results/
          git diff --staged --quiet || git commit -m "chore: score predictions $(date -u +%Y-%m-%d)"
          git push
