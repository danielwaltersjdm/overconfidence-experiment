name: Export to Website

# Regenerate website JSON after Daily Score completes successfully.
# Also supports manual trigger for re-export without re-scoring.
on:
  workflow_run:
    workflows: ["Daily Score"]
    types: [completed]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run if score workflow succeeded (or if manually triggered)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch latest so we have the newly-committed scored.csv
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: study4/requirements.txt

      - name: Install dependencies
        run: pip install -r study4/requirements.txt

      - name: Export website data
        working-directory: study4
        run: python export_data.py

      - name: Commit website data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add study4/website/data/
          git diff --staged --quiet || git commit -m "chore: export website data $(date -u +%Y-%m-%d)"
          git push
        # Pushing to study4/website/data/ triggers Vercel/Netlify auto-redeploy
        # because the webhook watches the entire repo by default.
