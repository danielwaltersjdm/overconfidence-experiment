# Study 4 Configuration — Longitudinal LLM CI Tracking (v2)
# Redesigned 2026-04-06: 200 stocks only, point estimate + 90% CI

study:
  name: "Study 4 — Longitudinal LLM Confidence Interval Tracking"
  start_date: "2026-04-07"
  version: 2
  version_note: "v2: 200 stocks, 90% CI only, 3 horizons. v1 (pilot) archived."

# ── Model configuration ────────────────────────────────────────────────────────
models:
  - name: claude
    api: anthropic
    model_id: claude-sonnet-4-6

  - name: gpt4o
    api: openai
    model_id: gpt-4o-2024-11-20

  - name: gemini
    api: google
    model_id: gemini-2.5-flash

model_version_changes: []

# ── Prediction horizons ────────────────────────────────────────────────────────
horizons:
  - id: "1d"
    days: 1
    label: "1-Day"
  - id: "1w"
    days: 7
    label: "1-Week"
  - id: "1m"
    days: 30
    label: "1-Month"

# Only 90% CI collected (point estimate + upper/lower bounds)
ci_levels: [90]

# Rolling window for the public index (days)
rolling_window_days: 30

# ── Weekend / holiday collection behaviour ────────────────────────────────────
weekend_collection:
  stocks: false  # skip Sat/Sun (no market data)

# ── Stocks: 200 tickers ───────────────────────────────────────────────────────
